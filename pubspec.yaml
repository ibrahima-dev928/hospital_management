name: hospital_management
description: Hospital Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.7.0
  iconsax: ^0.0.8
  # State Management
  provider: ^6.1.1
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  # Local Storage
  shared_preferences: ^2.2.2
  # Image picker
  image_picker: ^1.0.5
  # Date formatting
  intl: ^0.18.1
  # Notifications
  flutter_local_notifications: ^17.2.2
  flutter_secure_storage: ^9.2.2 # pour stocker le token de façon sécurisée
  firebase_messaging: ^14.7.10 # pour les notifications
  flutter_stripe: ^10.0.0
  web_socket_channel: ^2.4.0 # pour WebSocket (messages en temps réel)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
